# =============================================================================
# Snippets — Cloud Workstation
# =============================================================================
# Format: label|value (pipe-separated, one per line)
# Lines starting with # are comments, blank lines are skipped.
# Press CTRL+SHIFT+S to open the snippet picker.
# =============================================================================

# --- Common Shell Commands ---
List all containers|docker ps -a
Docker compose up|docker compose up -d
Find large files|find . -type f -size +100M -exec ls -lh {} \;
Disk usage summary|du -sh * | sort -rh | head -20
Watch logs|tail -f /var/log/syslog

# --- Git Commands ---
Git status short|git status -sb
Git log oneline|git log --oneline --graph --decorate -20
Git diff staged|git diff --staged
Git stash with message|git stash push -m ""
Git reset last commit|git reset --soft HEAD~1
Git amend no edit|git commit --amend --no-edit

# --- GCP / gcloud ---
List instances|gcloud compute instances list
List workstations|gcloud workstations list --project=YOUR_PROJECT_ID
SSH to instance|gcloud compute ssh --zone=us-west1-b
Current project|gcloud config get-value project
Set project|gcloud config set project YOUR_PROJECT_ID

# --- Kubernetes ---
Get pods all ns|kubectl get pods --all-namespaces
Pod logs follow|kubectl logs -f
Describe pod|kubectl describe pod

# --- Text Snippets ---
Shebang bash|#!/bin/bash
Shebang python|#!/usr/bin/env python3
TODO marker|# TODO(user):
Timestamp command|date '+%Y-%m-%d %H:%M:%S'
