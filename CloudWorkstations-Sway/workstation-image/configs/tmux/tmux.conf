# =============================================================================
# tmux.conf — Tokyo Night Theme
# =============================================================================

# True color + 256 color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse support
set -g mouse on

# Window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# History
set -g history-limit 50000

# Auto-rename windows to current directory
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"

# Set terminal title
set -g set-titles on
set -g set-titles-string "#S:#I — #{b:pane_current_path}"

# Vi copy mode
setw -g mode-keys vi

# Reduce escape delay
set -sg escape-time 10

# Focus events for vim/neovim
set -g focus-events on

# ── Tokyo Night Status Bar ──────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1b26,fg=#c0caf5"

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "
set -g status-left-length 20

set -g status-right "#[fg=#565f89]#{?client_prefix,#[fg=#f7768e]PREFIX ,}#[fg=#9ece6a]%H:%M #[fg=#c0caf5]%b %d "
set -g status-right-length 40

# Window tabs
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[bg=#24283b,fg=#7aa2f7,bold] #I:#W "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

# Message / command bar
set -g message-style "bg=#24283b,fg=#c0caf5"
set -g message-command-style "bg=#24283b,fg=#c0caf5"

# Copy mode highlight
setw -g mode-style "bg=#24283b,fg=#c0caf5"

# Clock
setw -g clock-mode-colour "#7aa2f7"
