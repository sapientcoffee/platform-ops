steps:
# 1. 🏗️ Build & Multi-Tag: Build once, tag twice (Latest + Git SHA)
- name: 'gcr.io/kaniko-project/executor:latest'
  args: [
    "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/workstation:latest",
    "--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/workstation:${_TAG}",
    "--dockerfile=Dockerfile",
    "--context=dir:///workspace/cloudworkstations/sway/workstation-image",
    "--cache=true",
    "--cache-ttl=24h"]
  id: "build"

# 2. 🧪 Smoke Tests: Ensure base utilities are present
- name: '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/workstation:latest'
  entrypoint: 'bash'
  args: 
    - '-c'
    - |
      set -e
      echo "Running Smoke Tests..."
      # Check for critical binaries
      which wayvnc
      which tailscale
      sway --version
      echo "✅ Base utilities verified!"
  id: "smoke-test"
  waitFor: ["build"]

# 3. 🔍 Security Scan: Check for vulnerabilities
- name: 'aquasec/trivy:latest'
  args: ['image', '--severity', 'HIGH,CRITICAL', '--exit-code', '0', '${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_AR_REPO}/workstation:latest']
  id: "scan"
  waitFor: ["build"]

timeout: '7200s'
substitutions:
  _REGION: 'us-central1'
  _AR_REPO: 'workstation-images'
  _TAG: 'manual'
options:
  logStreamingOption: STREAM_ON
  machineType: 'E2_HIGHCPU_8'
