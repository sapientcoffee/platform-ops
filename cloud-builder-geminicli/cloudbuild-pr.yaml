steps:
  # Build the image (without pushing it as 'latest')
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    dir: 'cloud-builder-geminicli'
    args:
      - 'build'
      - '--tag=us-docker.pkg.dev/coffee-plantation/cloud-build-builder/gemini-builder:$SHORT_SHA'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Smoke test: check version using the SHA-tagged image
  - name: 'us-docker.pkg.dev/coffee-plantation/cloud-build-builder/gemini-builder:$SHORT_SHA'
    id: 'smoke-test-gemini'
    dir: 'cloud-builder-geminicli'
    args: ['--version']

# Note: We do NOT include the 'images' section here to avoid pushing to the registry 
# automatically on PRs. If you want to push the PR build for debugging or testing,
# you can uncomment the following lines.
# images:
#   - 'us-docker.pkg.dev/coffee-plantation/cloud-build-builder/gemini-builder:$SHORT_SHA'

timeout: '1200s'
