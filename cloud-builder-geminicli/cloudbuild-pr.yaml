steps:
  # Build the image (without pushing it as 'latest')
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag=europe-docker.pkg.dev/$PROJECT_ID/codey-builder-image/geminicli-builder:$SHORT_SHA'
      - '-f'
      - 'cloud-builder-geminicli/Dockerfile'
      - 'cloud-builder-geminicli/.'

  # Smoke test: check version using the SHA-tagged image
  - name: 'europe-docker.pkg.dev/$PROJECT_ID/codey-builder-image/geminicli-builder:$SHORT_SHA'
    id: 'smoke-test-gemini'
    args: ['--version']

  # Smoke test: check geminicli alias
  - name: 'europe-docker.pkg.dev/$PROJECT_ID/codey-builder-image/geminicli-builder:$SHORT_SHA'
    id: 'smoke-test-geminicli'
    entrypoint: 'geminicli'
    args: ['--version']

# Note: We do NOT include the 'images' section here to avoid pushing to the registry 
# automatically on PRs, or we can push with the $SHORT_SHA for debugging.
# If you want to push the PR build for testing:
images:
  - 'europe-docker.pkg.dev/$PROJECT_ID/codey-builder-image/geminicli-builder:$SHORT_SHA'

timeout: '1200s'
