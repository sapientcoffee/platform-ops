steps:
  # Build the image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '--tag=us-docker.pkg.dev/$PROJECT_ID/gcr.io/geminicli-builder:latest'
      - '-f'
      - 'cloud-builder-geminicli/Dockerfile'
      - 'cloud-builder-geminicli/.'

  # Smoke test: check version
  - name: 'us-docker.pkg.dev/$PROJECT_ID/gcr.io/geminicli-builder:latest'
    id: 'smoke-test-gemini'
    args: ['--version']

  # Smoke test: check geminicli alias
  - name: 'us-docker.pkg.dev/$PROJECT_ID/gcr.io/geminicli-builder:latest'
    id: 'smoke-test-geminicli'
    entrypoint: 'geminicli'
    args: ['--version']

images:
  - 'us-docker.pkg.dev/$PROJECT_ID/gcr.io/geminicli-builder:latest'

timeout: '1200s'
