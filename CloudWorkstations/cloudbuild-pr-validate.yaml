steps:
- name: 'gcr.io/kaniko-project/executor:latest'
  args: [
    "--no-push",
    "--dockerfile=./CloudWorkstations/Dockerfile",
    "--context=dir:///workspace/CloudWorkstations",
    "--cache=true",
    "--cache-ttl=24h"]
  id: "Validating Cloud Workstations Image Build (No Push)"

timeout: '3600s'
